<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        div.galery {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-start;
        }

        div.galery-item {
            margin: 5px;
            border: 1px solid cyan;
            width: 180px;
        }

        div.galery-item:hover {
            border: 1px solid blue;
        }

        div.galery-item img {
            width: 100%;
            height: auto;
        }

        div.galery-item div.desc {
            padding: 15px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h2>Image Gallery</h2>

<div class="galery">

<div class="galery-item">
    <a target="_blank" href="img_5terre.jpg.jpeg">
        <img src="img_5terre.jpg.jpeg" alt="Cinque Terre" width="600" height="400">
    </a>
    <div class="desc">Cinque Terre</div>

<div class="galery-item">
    <a target="_blank" href="img_forest.jpg.jpeg">
        <img src="img_forest.jpg.jpeg" alt="Forrest" width="600" height="400">
    </a>
    <div class="desc">Forrest</div>

<div class="galery-item">
    <a target="_blank" href="img_lights.jpg.jpeg">
        <img src="img_lights.jpg.jpeg" alt="Northen LIghts" width="600" height="400">
    </a>
    <div class="desc">Nothern Lights</div>

<div class="galery-item">
    <a target="_blank" href="img_mountains.jpg.jpeg">
        <img src="img_mountains.jpg.jpeg" alt="Mountains" width="600" height="400">
    </a>
    <div class="desc">Mountains</div>

</div>
</div>
</body>
</html>
