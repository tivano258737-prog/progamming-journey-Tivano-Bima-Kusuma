<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kotak Border</title>
    <style>
        .solid{
            border: 3px solid rgb(76, 40, 255);
            padding: 10px;
            margin: 10px;
        }
        .double{
            border: 6px double rgb(25, 255, 236);
            padding:10px ;
            margin: 10px;
        }
        .groove{
            border: 6px groove rgb(255, 200, 19);
            padding:10px ;
            margin:10px ;
        }
        .ridge{
            border: 6px ridge red;
            padding:10px ;
            margin:10px ;
        }
    </style>
</head>
<body>
    <h1>Membuat 4 Jenis Border</h1>

    <div class="solid"><p>Paragraf ini dibuat mengngunakan border solid.</p></div>
    <div class="double"><p>Paragraf ini dibuat mengunakan border double.</p></div>
    <div class="groove"><p>Paragraf ini dibuat menggunakan border groove.</p></div>
    <div class="ridge"><p>Paragraf ini dibuat menggunakan border ridge.</p></div>
</body>
</html>
