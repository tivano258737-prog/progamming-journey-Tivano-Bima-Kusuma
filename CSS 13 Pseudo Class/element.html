<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=\, initial-scale=1.0">
    <title>Pseudo urutan elemen</title>

    <style>
        li:first-child a {
            color: green;
        }
        li:last-child a {
            color: red;
        }
        li:nth-child(3) a {
            color: yellow;
        }
        li:nth-child(2n) a {
            color: blue;
        }
        li:nth-child() a {
            color: salmon;
        }
    </style>
</head>
<body>
    <a href="#" class="hello">Hello Workd</a>

    <ul>
        <li> <a href="#">Link 1</a></li>
        <li> <a href="#">Link 2</a></li>
        <li> <a href="#">Link 3</a></li>
        <li> <a href="#">Link 4</a></li>
        <li> <a href="#">Link 5</a></li>
    </ul>
</body>
</html>
