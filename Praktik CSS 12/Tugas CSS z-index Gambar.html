<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas x-index gambar bertumpuk</title>
    
    <style>
          div{
            position: absolute;
            width: 200px;
            height: 200px;
        }
        .gambar-satu{
        }
        .gambar-dua{
            top: 100px;
            left: 100px;
        }
        .gambar-tiga{
            top: 200px;
            left: 200px;
        }
    </style>
</head>
<body>
    <div class="gambar-satu"><img src="img_forest.jpg.jpeg"></div>
    <div class="gambar-dua"><img src="img_lights.jpg.jpeg"></div>
    <div class="gambar-tiga"><img src="img_mountains.jpg.jpeg"></div>
</body>
</html>
