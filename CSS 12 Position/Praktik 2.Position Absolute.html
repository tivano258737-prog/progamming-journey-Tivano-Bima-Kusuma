<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .container {
        position: relative;
        width: 300px;
        height: 300px;
        background-color: salmon;
        }

        .box {
            position: absolute;
            top: 50px;
            left: 50px;
            background-color: rebeccapurple;
            width: 100px;
            height: 100px;
        }
    </style>
</head>
<body>
    <div class="container"></div>
    <div class="box">Absolute</div>
</body>
</html>
