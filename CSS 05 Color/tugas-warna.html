<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas Warna</title>
    <style>
          .warna1 {
            background-color: rgb(255, 5, 5);
            color: white;
            padding: 10px;
            margin: 5px;
        }
        .warna2 {
            background-color: rgb(255, 247, 0);
            color: black;
            padding: 10px;
            margin: 5px;
        }
        .warna3 {
            background-color: hsl(240, 100%, 50%);
            color: white;
            padding: 10px;
            margin: 5px;
        }
        .warna4 {
            background-color: hsla(120, 100%, 25%, 0.7);
            color: white;
            padding: 10px;
            margin: 5px;
        }
    </style>
</head>
<body>
     <div class="warna1"> Warna dengan kode RGB </div>
    <div class="warna2"> Warna dengan RGBA </div>
    <div class="warna3"> Warna dengan HSL </div>
    <div class="warna4"> Warna dengan HSLA </div>
</body>
</html>
