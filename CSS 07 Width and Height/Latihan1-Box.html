<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan BOX</title>
    <style>
        .Box1 {
            width:200px;
            height:200px;
            background-color: cyan;
        }
        .Box2 {
            width: 50%;
            height: 150px;
            background-color: red;
        }
        .Box3 {
            width: 80vw;
            height: 30vh;
            background-color: yellow;
        }
    </style>
</head>
<body>
    <div class="Box1">Ini adalah hasil dari box 1</div>
    <div class="Box2">Ini adalah hasil dari box 2</div>
    <div class="Box3">Ini adalah hasil dari box 3</div>
</body>
</html>
